name: Web

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/.git*'
      - '!**/.github/workflows/ci-web.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install PNPM
        uses: pnpm/action-setup@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
          node-version-file: .node-version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Running Lint
        run: "pnpm lint:fix"
      - name: Add commit
        uses: EndBug/add-and-commit@v9
        if: ${{ !env.ACT }} # 로컬 테스트 시에는 커밋하지 않는다.
        with:
          commit: --signoff
          default_author: github_actor
          message: "style: 자동 코드 스타일 수정 [skip ci]"
          push: true
  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install PNPM
        uses: pnpm/action-setup@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
          node-version-file: .node-version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download build cache
        uses: actions/cache@v4
        with:
          key: ${{ github.workflow }}-build_cache-${{ runner.os }}
          path: |
            .turbo/cache/
            node_modules/.cache/.nuxt/
            apps/web/node_modules/.cache/
      - name: Build webapp
        run: "pnpm build:web"
      - name: Upload artifacts
        if: github.event_name != 'pull_request' # pull request 시에는 빌드 결과를 업로드하지 않는다.
        uses: actions/upload-artifact@v4
        with:
          name: pawquar-web-${{ github.sha }}
          path: |
            apps/web/package.json
            apps/web/.output/
      - name: Upload build cache
        uses: actions/cache@v4
        with:
          key: ${{ github.workflow }}-build_cache-${{ runner.os }}
          path: |
            .turbo/cache/
            node_modules/.cache/.nuxt/
            apps/web/node_modules/.cache/
